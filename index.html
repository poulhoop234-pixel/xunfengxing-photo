<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>科华服务记录单</title>
<style>
body{font-family:Arial,'Microsoft YaHei',sans-serif;margin:0;background:#f3f4f6;color:#111}
.wrap{max-width:980px;margin:auto;background:#fff;padding:18px}
.head,.sub{text-align:center;font-weight:700;font-size:22px}
.sub{margin-bottom:12px}
table{width:100%;border-collapse:collapse;table-layout:fixed}
td,th{border:1px solid #111;padding:8px;vertical-align:middle;word-break:break-all}
input,textarea{width:100%;border:0;outline:0;font-size:16px;background:transparent;box-sizing:border-box}
textarea{min-height:90px;resize:vertical}
.sec{text-align:center;font-weight:700;background:#fafafa}
.chk{width:auto;transform:scale(1.1);margin-right:4px}
.inline-field{display:inline-block;vertical-align:middle}
.uline{border-bottom:1px solid #333;background:transparent}
.btnbar{position:sticky;bottom:0;background:#fff;padding:8px 0;z-index:20}
.btn{background:#111;color:#fff;border:0;border-radius:8px;padding:12px 16px;margin:6px 4px;cursor:pointer;font-size:16px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.sig-preview{border:1px dashed #888;height:95px;width:100%;background:#fff;touch-action:none;cursor:pointer;box-sizing:border-box;overflow:hidden}
.sig-preview svg{width:100%;height:100%;display:block}
.sign-meta{display:grid;grid-template-columns:110px 1fr 70px 1fr;gap:8px;align-items:center;margin-top:10px}
.sign-meta .lbl{white-space:nowrap}
.nowrap{white-space:nowrap}
.sign-modal{position:fixed;inset:0;background:#fff;z-index:99999;display:none;flex-direction:column}
.sign-modal.show{display:flex}
.sign-top{height:56px;display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid #ddd;background:#fff;box-sizing:border-box;z-index:2}
.sign-title{font-weight:700;flex:1;font-size:16px;text-align:center}
.sign-top button{border:0;border-radius:8px;padding:10px 14px;font-size:15px;cursor:pointer}
.sign-cancel{background:#e5e7eb;color:#111}
.sign-clear{background:#f3f4f6;color:#111;border:1px solid #ddd!important}
.sign-ok{background:#111;color:#fff}
.sign-board-wrap{flex:1;position:relative;background:#fff;overflow:hidden;touch-action:none}
#signSvg{width:100%;height:100%;display:block;background:#fff;touch-action:none}
.sign-path{fill:none;stroke:#111;stroke-width:2.8;stroke-linecap:round;stroke-linejoin:round}
.loading{position:fixed;inset:0;background:rgba(255,255,255,.78);z-index:999999;display:none;align-items:center;justify-content:center;font-size:18px;font-weight:700}
.loading.show{display:flex}
@media (max-width:768px){
  .wrap{padding:8px}
  .head,.sub{font-size:16px}
  td,th{padding:6px;font-size:14px}
  input,textarea{font-size:15px}
  textarea{min-height:80px}
  .sig-preview{height:105px}
  .sign-meta{grid-template-columns:72px 1fr;gap:6px}
  .sign-meta .date-label{grid-column:1/2}
  .sign-meta .date-input{grid-column:2/3}
  .btn{font-size:15px;padding:11px 14px}
  .sign-top{height:54px}
}
@media print{
  .no,.sign-modal,.loading{display:none!important}
  body{background:#fff}
  .wrap{max-width:none;padding:0}
  .sig-preview{border:0}
}
</style>
</head>
<body>
<div id="serviceForm" class="wrap">
  <div class="head">厦门科华数能科技有限公司</div>
  <div class="sub">光伏储能系统现场服务记录单</div>

  <table>
    <tr><td style="width:15%">服务流程号</td><td style="width:40%"><input></td><td style="width:15%">填表日期</td><td style="width:30%"><input type="date"></td></tr>
    <tr><td colspan="4" class="sec">一、基本信息</td></tr>
    <tr><td>项目名称</td><td colspan="3"><input></td></tr>
    <tr><td>最终客户</td><td><input></td><td>客户联系人</td><td><input></td></tr>
    <tr><td>客户地址</td><td><input></td><td>联系电话</td><td><input></td></tr>
    <tr><td>服务内容</td><td colspan="3"><label><input class="chk" type="checkbox">调试</label> <label><input class="chk" type="checkbox">维修</label> <label><input class="chk" type="checkbox">巡检</label> <label><input class="chk" type="checkbox">升级</label> <span class="nowrap">其他：</span><input class="inline-field uline" style="width:180px"></td></tr>
    <tr><td>服务工程师</td><td><input></td><td>工程师联系电话</td><td><input></td></tr>
    <tr><td>服务开始日期</td><td><input type="date" id="s"></td><td>服务结束日期</td><td><input type="date" id="e"></td></tr>
    <tr><td>共计服务天数</td><td colspan="3"><input id="days" placeholder="自动计算"></td></tr>

    <tr><td colspan="4" class="sec">二、服务内容及处理结果（服务工程师填写）</td></tr>
    <tr><td>问题描述</td><td colspan="3"><textarea></textarea></td></tr>
    <tr><td>处理过程</td><td colspan="3"><textarea></textarea></td></tr>
    <tr><td>处理结果</td><td colspan="3"><label><input class="chk" type="checkbox">已完成，系统运行正常</label> <label><input class="chk" type="checkbox">需后续跟进</label> <span class="nowrap">说明：</span><input class="inline-field uline" style="width:220px"><br>其他：<input class="uline"></td></tr>

    <tr><td colspan="4" class="sec">三、客户评价</td></tr>
    <tr><td>满意度评价</td><td colspan="3"><label><input class="chk" type="checkbox">非常满意</label> <label><input class="chk" type="checkbox">满意</label> <label><input class="chk" type="checkbox">一般</label> <label><input class="chk" type="checkbox">不满意</label></td></tr>
    <tr><td>意见 / 建议</td><td colspan="3"><textarea></textarea></td></tr>

    <tr><td colspan="4" class="sec">四、现场服务确认（客户填写）</td></tr>
    <tr><td>确认内容</td><td colspan="3">本人确认：上述服务人员于 <input class="inline-field uline" style="width:64px"> 年 <input class="inline-field uline" style="width:48px"> 月 <input class="inline-field uline" style="width:48px"> 日至 <input class="inline-field uline" style="width:64px"> 年 <input class="inline-field uline" style="width:48px"> 月 <input class="inline-field uline" style="width:48px"> 日期间，共计 <input class="inline-field uline" style="width:60px"> 人天，在本单位现场提供了真实有效的服务。</td></tr>

    <tr>
      <td>服务工程师签字</td>
      <td colspan="3">
        <div class="sig-preview" data-title="服务工程师签字" data-index="0"></div>
        <div class="sign-meta"><div class="lbl">联系方式</div><input><div class="lbl date-label">日期</div><input class="date-input" type="date"></div>
      </td>
    </tr>
    <tr>
      <td>客户签字</td>
      <td colspan="3">
        <div class="sig-preview" data-title="客户签字" data-index="1"></div>
        <div class="sign-meta"><div class="lbl">联系方式</div><input><div class="lbl date-label">日期</div><input class="date-input" type="date"></div>
      </td>
    </tr>
  </table>

  <div class="btnbar no">
    <button class="btn" type="button" id="pdfBtn">生成 PDF</button>
    <button class="btn" type="button" id="imgBtn">保存图片</button>
    <button class="btn" type="button" onclick="clearAllData()">清空</button>
  </div>
</div>

<div id="signModal" class="sign-modal no">
  <div class="sign-top">
    <button class="sign-cancel" type="button" onclick="closeSign(false)">取消</button>
    <div id="signTitle" class="sign-title">签字</div>
    <button class="sign-clear" type="button" onclick="clearBoard()">清除</button>
    <button class="sign-clear" type="button" onclick="manualRotate()">旋转</button>
    <button class="sign-ok" type="button" onclick="closeSign(true)">确认</button>
  </div>
  <div class="sign-board-wrap">
    <svg id="signSvg" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none"></svg>
  </div>
</div>

<div id="loading" class="loading no">正在生成...</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<script>
const SVG_NS='http://www.w3.org/2000/svg';
const fields=document.querySelectorAll('input,textarea');
fields.forEach((x,i)=>{
  const k='f'+i;
  if(x.type==='checkbox'){
    x.checked=localStorage[k]==='1';
    x.onchange=()=>localStorage[k]=x.checked?'1':'0';
  }else{
    x.value=localStorage[k]||'';
    x.oninput=()=>localStorage[k]=x.value;
    x.onchange=()=>localStorage[k]=x.value;
  }
});

function calc(){
  if(s.value&&e.value){
    const a=new Date(s.value),b=new Date(e.value);
    days.value=Math.max(1,Math.round((b-a)/86400000)+1);
    const idx=[...fields].indexOf(days);
    if(idx>=0) localStorage['f'+idx]=days.value;
  }
}
s.onchange=e.onchange=calc;

function newSvg(viewBox='0 0 1000 350'){
  const svg=document.createElementNS(SVG_NS,'svg');
  svg.setAttribute('xmlns',SVG_NS);
  svg.setAttribute('viewBox',viewBox);
  svg.setAttribute('preserveAspectRatio','xMidYMid meet');
  svg.style.width='100%';
  svg.style.height='100%';
  svg.style.display='block';
  return svg;
}
function renderPreview(el,idx){
  el.innerHTML='';
  const data=localStorage['sigSvg'+idx] || '';
  const svg=newSvg('0 0 1000 350');
  if(data) svg.innerHTML=data;
  el.appendChild(svg);
}
document.querySelectorAll('.sig-preview').forEach(el=>{
  const idx=el.dataset.index;
  renderPreview(el,idx);
  el.addEventListener('click',()=>openSign(el,idx));
});

let activeEl=null,activeIndex=0,drawing=false,currentPath=null,currentD='';
const modal=document.getElementById('signModal');
const signSvg=document.getElementById('signSvg');

function setBoardViewBox(){
  const r=signSvg.getBoundingClientRect();
  signSvg.setAttribute('viewBox',`0 0 ${Math.max(1,Math.round(r.width))} ${Math.max(1,Math.round(r.height))}`);
}

function openSign(el,idx){
  activeEl=el;
  activeIndex=idx;
  document.getElementById('signTitle').textContent=el.dataset.title||'签字';
  modal.classList.add('show');
  document.body.style.overflow='hidden';
  signSvg.innerHTML='';
  setTimeout(()=>{
    setBoardViewBox();
    const old=localStorage['sigRaw'+idx] || '';
    if(old) signSvg.innerHTML=old;
  },80);
}
function manualRotate(){
  const raw=signSvg.innerHTML;
  if(!raw) return;
  let box;
  try{ box=signSvg.getBBox(); }catch(e){ box=null; }
  if(!box || !box.width || !box.height) return;

  const vb=signSvg.viewBox.baseVal;
  const w=vb.width || signSvg.getBoundingClientRect().width;
  const h=vb.height || signSvg.getBoundingClientRect().height;

  const g=document.createElementNS(SVG_NS,'g');
  // 围绕当前签字板中心旋转 90°，用于个别手机方向判断不准时手动纠正。
  g.setAttribute('transform',`translate(${w/2} ${h/2}) rotate(90) translate(${-w/2} ${-h/2})`);
  g.innerHTML=raw;
  signSvg.innerHTML='';
  signSvg.appendChild(g);
}

function closeSign(save){
  if(save && activeEl){
    const raw=signSvg.innerHTML;
    localStorage['sigRaw'+activeIndex]=raw;
    localStorage['sigSvg'+activeIndex]=normalizeSvgForPreview(signSvg);
    renderPreview(activeEl,activeIndex);
  }
  modal.classList.remove('show');
  document.body.style.overflow='';
}
function clearBoard(){
  signSvg.innerHTML='';
}
function normalizeSvgForPreview(svg){
  const raw=svg.innerHTML;
  if(!raw) return '';

  let box;
  try{
    box=svg.getBBox();
  }catch(e){
    box=null;
  }

  if(!box || !box.width || !box.height){
    const vb=svg.viewBox.baseVal;
    if(!vb || !vb.width || !vb.height) return raw;
    box={x:0,y:0,width:vb.width,height:vb.height};
  }

  const targetW=1000;
  const targetH=350;
  const padding=36;

  const g=document.createElementNS(SVG_NS,'g');

  // 如果签名整体是竖向的，就自动旋转成横向后再塞回表格签字框。
  const needRotate = box.height > box.width * 1.15;

  let contentW = needRotate ? box.height : box.width;
  let contentH = needRotate ? box.width : box.height;
  const scale=Math.min((targetW-padding*2)/contentW,(targetH-padding*2)/contentH);

  const tx=(targetW-contentW*scale)/2;
  const ty=(targetH-contentH*scale)/2;

  if(needRotate){
    // 先把原签名左上角归零，再顺时针旋转 90°，最后居中缩放进签字框。
    g.setAttribute(
      'transform',
      `translate(${tx} ${ty}) scale(${scale}) rotate(90) translate(${-box.x} ${-box.y-box.height})`
    );
  }else{
    g.setAttribute(
      'transform',
      `translate(${tx} ${ty}) scale(${scale}) translate(${-box.x} ${-box.y})`
    );
  }

  g.innerHTML=raw;
  return g.outerHTML;
}
function point(e){
  const r=signSvg.getBoundingClientRect();
  return [e.clientX-r.left,e.clientY-r.top];
}
function addPath(x,y){
  currentPath=document.createElementNS(SVG_NS,'path');
  currentPath.setAttribute('class','sign-path');
  currentD=`M ${x.toFixed(1)} ${y.toFixed(1)}`;
  currentPath.setAttribute('d',currentD);
  signSvg.appendChild(currentPath);
}
function movePath(x,y){
  if(!currentPath)return;
  currentD+=` L ${x.toFixed(1)} ${y.toFixed(1)}`;
  currentPath.setAttribute('d',currentD);
}
signSvg.addEventListener('pointerdown',e=>{
  e.preventDefault();
  signSvg.setPointerCapture && signSvg.setPointerCapture(e.pointerId);
  drawing=true;
  const [x,y]=point(e);
  addPath(x,y);
},{passive:false});
signSvg.addEventListener('pointermove',e=>{
  if(!drawing)return;
  e.preventDefault();
  const [x,y]=point(e);
  movePath(x,y);
},{passive:false});
signSvg.addEventListener('pointerup',e=>{
  drawing=false;
  signSvg.releasePointerCapture && signSvg.releasePointerCapture(e.pointerId);
},{passive:false});
signSvg.addEventListener('pointercancel',()=>drawing=false,{passive:false});

window.addEventListener('resize',()=>{
  if(modal.classList.contains('show')){
    const old=signSvg.innerHTML;
    setBoardViewBox();
    signSvg.innerHTML=old;
  }
});

function showLoading(show){
  document.getElementById('loading').classList.toggle('show',!!show);
}
function filename(ext){
  const d=new Date();
  const p=n=>String(n).padStart(2,'0');
  return '科华服务记录单_'+d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'_'+p(d.getHours())+p(d.getMinutes())+'.'+ext;
}
async function makeCanvas(){
  if(typeof html2canvas==='undefined') throw new Error('html2canvas not loaded');
  document.activeElement && document.activeElement.blur();
  const node=document.getElementById('serviceForm');
  const btnbar=document.querySelector('.btnbar');
  btnbar.style.display='none';
  await new Promise(r=>setTimeout(r,160));
  const canvas=await html2canvas(node,{scale:2,useCORS:true,backgroundColor:'#ffffff',scrollX:0,scrollY:0});
  btnbar.style.display='';
  return canvas;
}
async function saveImage(){
  showLoading(true);
  try{
    const canvas=await makeCanvas();
    const a=document.createElement('a');
    a.href=canvas.toDataURL('image/png');
    a.download=filename('png');
    document.body.appendChild(a);
    a.click();
    a.remove();
  }catch(e){
    window.print();
  }finally{
    showLoading(false);
  }
}
async function savePdf(){
  showLoading(true);
  try{
    if(typeof window.jspdf==='undefined') throw new Error('jspdf not loaded');
    const canvas=await makeCanvas();
    const imgData=canvas.toDataURL('image/jpeg',0.96);
    const { jsPDF }=window.jspdf;
    const pdf=new jsPDF('p','mm','a4');
    const pageW=210, pageH=297;
    const margin=8;
    const usableH=pageH-margin*2;
    const imgW=pageW-margin*2;
    const imgH=canvas.height*imgW/canvas.width;
    let y=margin;
    pdf.addImage(imgData,'JPEG',margin,y,imgW,imgH);
    let remaining=imgH-usableH;
    while(remaining>0){
      pdf.addPage();
      y=margin-(imgH-remaining);
      pdf.addImage(imgData,'JPEG',margin,y,imgW,imgH);
      remaining-=usableH;
    }
    pdf.save(filename('pdf'));
  }catch(e){
    window.print();
  }finally{
    showLoading(false);
  }
}
document.getElementById('pdfBtn').addEventListener('click',savePdf);
document.getElementById('imgBtn').addEventListener('click',saveImage);

function clearAllData(){
  localStorage.clear();
  location.reload();
}
</script>
</body>
</html>
