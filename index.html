<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>科华服务记录单</title>
<style>
body{font-family:Arial,'Microsoft YaHei',sans-serif;margin:0;background:#f3f4f6;color:#111}
.wrap{max-width:980px;margin:auto;background:#fff;padding:18px}
.head,.sub{text-align:center;font-weight:700;font-size:22px}
.sub{margin-bottom:12px}
table{width:100%;border-collapse:collapse;table-layout:fixed}
td,th{border:1px solid #111;padding:8px;vertical-align:middle;word-break:break-all}
input,textarea{width:100%;border:0;outline:0;font-size:16px;background:transparent;box-sizing:border-box}
textarea{min-height:90px;resize:vertical}
.sec{text-align:center;font-weight:700;background:#fafafa}
.chk{width:auto;transform:scale(1.1);margin-right:4px}
.inline-field{display:inline-block;vertical-align:middle}
.uline{border-bottom:1px solid #333;background:transparent}
.btnbar{position:sticky;bottom:0;background:#fff;padding:8px 0;z-index:20}
.btn{background:#111;color:#fff;border:0;border-radius:8px;padding:12px 16px;margin:6px 4px;cursor:pointer;font-size:16px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.sig-preview{border:1px dashed #888;height:95px;width:100%;display:block;background:#fff;touch-action:none;cursor:pointer}
.sign-meta{display:grid;grid-template-columns:110px 1fr 70px 1fr;gap:8px;align-items:center;margin-top:10px}
.sign-meta .lbl{white-space:nowrap}
.nowrap{white-space:nowrap}
.sign-modal{position:fixed;inset:0;background:#fff;z-index:99999;display:none;flex-direction:column}
.sign-modal.show{display:flex}
.sign-top{height:56px;display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid #ddd;background:#fff;box-sizing:border-box;z-index:2}
.sign-title{font-weight:700;flex:1;font-size:16px;text-align:center}
.sign-top button{border:0;border-radius:8px;padding:10px 14px;font-size:15px;cursor:pointer}
.sign-cancel{background:#e5e7eb;color:#111}
.sign-clear{background:#f3f4f6;color:#111;border:1px solid #ddd!important}
.sign-ok{background:#111;color:#fff}
.sign-board-wrap{flex:1;position:relative;background:#fff;overflow:hidden}
.sign-board{width:100%;height:100%;display:block;background:#fff;touch-action:none}
.loading{position:fixed;inset:0;background:rgba(255,255,255,.78);z-index:999999;display:none;align-items:center;justify-content:center;font-size:18px;font-weight:700}
.loading.show{display:flex}
@media (max-width:768px){
  .wrap{padding:8px}
  .head,.sub{font-size:16px}
  td,th{padding:6px;font-size:14px}
  input,textarea{font-size:15px}
  textarea{min-height:80px}
  .sig-preview{height:105px}
  .sign-meta{grid-template-columns:72px 1fr;gap:6px}
  .sign-meta .date-label{grid-column:1/2}
  .sign-meta .date-input{grid-column:2/3}
  .btn{font-size:15px;padding:11px 14px}
}
@media print{
  .no,.sign-modal,.loading{display:none!important}
  body{background:#fff}
  .wrap{max-width:none;padding:0}
  .sig-preview{border:0}
}
</style>
</head>
<body>
<div id="serviceForm" class="wrap">
  <div class="head">厦门科华数能科技有限公司</div>
  <div class="sub">光伏储能系统现场服务记录单</div>

  <table>
    <tr><td style="width:15%">服务流程号</td><td style="width:40%"><input></td><td style="width:15%">填表日期</td><td style="width:30%"><input type="date"></td></tr>
    <tr><td colspan="4" class="sec">一、基本信息</td></tr>
    <tr><td>项目名称</td><td colspan="3"><input></td></tr>
    <tr><td>最终客户</td><td><input></td><td>客户联系人</td><td><input></td></tr>
    <tr><td>客户地址</td><td><input></td><td>联系电话</td><td><input></td></tr>
    <tr><td>服务内容</td><td colspan="3"><label><input class="chk" type="checkbox">调试</label> <label><input class="chk" type="checkbox">维修</label> <label><input class="chk" type="checkbox">巡检</label> <label><input class="chk" type="checkbox">升级</label> <span class="nowrap">其他：</span><input class="inline-field uline" style="width:180px"></td></tr>
    <tr><td>服务工程师</td><td><input></td><td>工程师联系电话</td><td><input></td></tr>
    <tr><td>服务开始日期</td><td><input type="date" id="s"></td><td>服务结束日期</td><td><input type="date" id="e"></td></tr>
    <tr><td>共计服务天数</td><td colspan="3"><input id="days" placeholder="自动计算"></td></tr>

    <tr><td colspan="4" class="sec">二、服务内容及处理结果（服务工程师填写）</td></tr>
    <tr><td>问题描述</td><td colspan="3"><textarea></textarea></td></tr>
    <tr><td>处理过程</td><td colspan="3"><textarea></textarea></td></tr>
    <tr><td>处理结果</td><td colspan="3"><label><input class="chk" type="checkbox">已完成，系统运行正常</label> <label><input class="chk" type="checkbox">需后续跟进</label> <span class="nowrap">说明：</span><input class="inline-field uline" style="width:220px"><br>其他：<input class="uline"></td></tr>

    <tr><td colspan="4" class="sec">三、客户评价</td></tr>
    <tr><td>满意度评价</td><td colspan="3"><label><input class="chk" type="checkbox">非常满意</label> <label><input class="chk" type="checkbox">满意</label> <label><input class="chk" type="checkbox">一般</label> <label><input class="chk" type="checkbox">不满意</label></td></tr>
    <tr><td>意见 / 建议</td><td colspan="3"><textarea></textarea></td></tr>

    <tr><td colspan="4" class="sec">四、现场服务确认（客户填写）</td></tr>
    <tr><td>确认内容</td><td colspan="3">本人确认：上述服务人员于 <input class="inline-field uline" style="width:64px"> 年 <input class="inline-field uline" style="width:48px"> 月 <input class="inline-field uline" style="width:48px"> 日至 <input class="inline-field uline" style="width:64px"> 年 <input class="inline-field uline" style="width:48px"> 月 <input class="inline-field uline" style="width:48px"> 日期间，共计 <input class="inline-field uline" style="width:60px"> 人天，在本单位现场提供了真实有效的服务。</td></tr>

    <tr><td>服务工程师签字</td><td colspan="3"><canvas class="sig-preview" data-title="服务工程师签字"></canvas><div class="sign-meta"><div class="lbl">联系方式</div><input><div class="lbl date-label">日期</div><input class="date-input" type="date"></div></td></tr>
    <tr><td>客户签字</td><td colspan="3"><canvas class="sig-preview" data-title="客户签字"></canvas><div class="sign-meta"><div class="lbl">联系方式</div><input><div class="lbl date-label">日期</div><input class="date-input" type="date"></div></td></tr>
  </table>

  <div class="btnbar no">
    <button class="btn" type="button" id="pdfBtn">生成 PDF</button>
    <button class="btn" type="button" id="imgBtn">保存图片</button>
    <button class="btn" type="button" onclick="clearAllData()">清空</button>
  </div>
</div>

<div id="signModal" class="sign-modal no">
  <div class="sign-top">
    <button class="sign-cancel" type="button" onclick="closeSign(false)">取消</button>
    <div id="signTitle" class="sign-title">签字</div>
    <button class="sign-clear" type="button" onclick="clearBoard()">清除</button>
    <button class="sign-ok" type="button" onclick="closeSign(true)">确认</button>
  </div>
  <div class="sign-board-wrap">
    <canvas id="signBoard" class="sign-board"></canvas>
  </div>
</div>

<div id="loading" class="loading no">正在生成...</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<script>
const fields=document.querySelectorAll('input,textarea');
fields.forEach((x,i)=>{
  const k='f'+i;
  if(x.type==='checkbox'){
    x.checked=localStorage[k]==='1';
    x.onchange=()=>localStorage[k]=x.checked?'1':'0';
  }else{
    x.value=localStorage[k]||'';
    x.oninput=()=>localStorage[k]=x.value;
    x.onchange=()=>localStorage[k]=x.value;
  }
});

function calc(){
  if(s.value&&e.value){
    const a=new Date(s.value),b=new Date(e.value);
    days.value=Math.max(1,Math.round((b-a)/86400000)+1);
    const idx=[...fields].indexOf(days);
    if(idx>=0) localStorage['f'+idx]=days.value;
  }
}
s.onchange=e.onchange=calc;

function fitCanvas(c){
  const ratio=Math.max(window.devicePixelRatio||1,1);
  const rect=c.getBoundingClientRect();
  c.width=Math.max(1,Math.floor(rect.width*ratio));
  c.height=Math.max(1,Math.floor(rect.height*ratio));
  const ctx=c.getContext('2d');
  ctx.setTransform(ratio,0,0,ratio,0,0);
  ctx.lineWidth=2.4;
  ctx.lineCap='round';
  ctx.lineJoin='round';
  ctx.strokeStyle='#111';
}

function drawImageContain(ctx,img,boxW,boxH){
  const ratio=Math.min(boxW/img.width, boxH/img.height);
  const w=img.width*ratio;
  const h=img.height*ratio;
  const x=(boxW-w)/2;
  const y=(boxH-h)/2;
  ctx.drawImage(img,x,y,w,h);
}
function copyCanvas(src,dst){
  fitCanvas(dst);
  const dctx=dst.getContext('2d');
  const dw=dst.getBoundingClientRect().width, dh=dst.getBoundingClientRect().height;
  dctx.clearRect(0,0,dw,dh);
  if(src) drawImageContain(dctx,src,dw,dh);
}

const previews=[...document.querySelectorAll('.sig-preview')];
previews.forEach((c,i)=>{
  fitCanvas(c);
  const saved=localStorage['sig'+i];
  if(saved){
    const img=new Image();
    img.onload=()=>drawImageContain(c.getContext('2d'),img,c.getBoundingClientRect().width,c.getBoundingClientRect().height);
    img.src=saved;
  }
  c.addEventListener('click',()=>openSign(c,i));
});

let activePreview=null,activeIndex=0,draw=false;
const modal=document.getElementById('signModal');
const board=document.getElementById('signBoard');
const bctx=board.getContext('2d');

function openSign(preview,index){
  activePreview=preview;
  activeIndex=index;
  document.getElementById('signTitle').textContent=preview.dataset.title||'签字';
  modal.classList.add('show');
  document.body.style.overflow='hidden';
  setTimeout(()=>{
    fitCanvas(board);
    bctx.clearRect(0,0,board.getBoundingClientRect().width,board.getBoundingClientRect().height);
    const saved=localStorage['sig'+index];
    if(saved){
      const img=new Image();
      img.onload=()=>drawImageContain(bctx,img,board.getBoundingClientRect().width,board.getBoundingClientRect().height);
      img.src=saved;
    }
  },120);
}

function closeSign(save){
  if(save && activePreview){
    copyCanvas(board,activePreview);
    localStorage['sig'+activeIndex]=activePreview.toDataURL('image/png');
  }
  modal.classList.remove('show');
  document.body.style.overflow='';
}

function clearBoard(){
  bctx.clearRect(0,0,board.getBoundingClientRect().width,board.getBoundingClientRect().height);
}

function getPoint(e){
  const rect=board.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  return [t.clientX-rect.left,t.clientY-rect.top];
}

board.addEventListener('pointerdown',e=>{
  e.preventDefault();
  board.setPointerCapture && board.setPointerCapture(e.pointerId);
  draw=true;
  bctx.beginPath();
  bctx.moveTo(...getPoint(e));
});
board.addEventListener('pointermove',e=>{
  if(!draw)return;
  e.preventDefault();
  bctx.lineTo(...getPoint(e));
  bctx.stroke();
});
board.addEventListener('pointerup',e=>{
  draw=false;
  board.releasePointerCapture && board.releasePointerCapture(e.pointerId);
});
board.addEventListener('pointercancel',()=>draw=false);
board.addEventListener('pointerleave',()=>draw=false);

window.addEventListener('resize',()=>{
  previews.forEach((c,i)=>{
    const saved=localStorage['sig'+i];
    fitCanvas(c);
    if(saved){
      const img=new Image();
      img.onload=()=>drawImageContain(c.getContext('2d'),img,c.getBoundingClientRect().width,c.getBoundingClientRect().height);
      img.src=saved;
    }
  });
  if(modal.classList.contains('show')){
      const temp=board.toDataURL('image/png');
    setTimeout(()=>{
      fitCanvas(board);
      const img=new Image();
      img.onload=()=>drawImageContain(bctx,img,board.getBoundingClientRect().width,board.getBoundingClientRect().height);
      img.src=temp;
    },80);
  }
});

function showLoading(show){
  document.getElementById('loading').classList.toggle('show',!!show);
}
function filename(ext){
  const d=new Date();
  const p=n=>String(n).padStart(2,'0');
  return '科华服务记录单_'+d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'_'+p(d.getHours())+p(d.getMinutes())+'.'+ext;
}
async function makeCanvas(){
  if(typeof html2canvas==='undefined') throw new Error('html2canvas not loaded');
  document.activeElement && document.activeElement.blur();
  const node=document.getElementById('serviceForm');
  const btnbar=document.querySelector('.btnbar');
  btnbar.style.display='none';
  await new Promise(r=>setTimeout(r,120));
  const canvas=await html2canvas(node,{scale:2,useCORS:true,backgroundColor:'#ffffff',scrollX:0,scrollY:0});
  btnbar.style.display='';
  return canvas;
}
async function saveImage(){
  showLoading(true);
  try{
    const canvas=await makeCanvas();
    const a=document.createElement('a');
    a.href=canvas.toDataURL('image/png');
    a.download=filename('png');
    document.body.appendChild(a);
    a.click();
    a.remove();
  }catch(e){
    window.print();
  }finally{
    showLoading(false);
  }
}
async function savePdf(){
  showLoading(true);
  try{
    if(typeof window.jspdf==='undefined') throw new Error('jspdf not loaded');
    const canvas=await makeCanvas();
    const imgData=canvas.toDataURL('image/jpeg',0.96);
    const { jsPDF }=window.jspdf;
    const pdf=new jsPDF('p','mm','a4');
    const pageW=210, pageH=297;
    const margin=8;
    const imgW=pageW-margin*2;
    const imgH=canvas.height*imgW/canvas.width;
    let heightLeft=imgH;
    let position=margin;
    pdf.addImage(imgData,'JPEG',margin,position,imgW,imgH);
    heightLeft-=pageH-margin*2;
    while(heightLeft>0){
      pdf.addPage();
      position=margin-heightLeft-(imgH-heightLeft);
      pdf.addImage(imgData,'JPEG',margin,position,imgW,imgH);
      heightLeft-=pageH-margin*2;
    }
    pdf.save(filename('pdf'));
  }catch(e){
    window.print();
  }finally{
    showLoading(false);
  }
}
document.getElementById('pdfBtn').addEventListener('click',savePdf);
document.getElementById('imgBtn').addEventListener('click',saveImage);

function clearAllData(){
  localStorage.clear();
  location.reload();
}
</script>
</body>
</html>
