<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>科华服务记录单</title>
<style>
body{font-family:Arial,'Microsoft YaHei',sans-serif;margin:0;background:#f3f4f6;color:#111}
.wrap{max-width:980px;margin:auto;background:#fff;padding:18px}
.head,.sub{text-align:center;font-weight:700;font-size:22px}
.sub{margin-bottom:12px}
table{width:100%;border-collapse:collapse;table-layout:fixed}
td,th{border:1px solid #111;padding:8px;vertical-align:middle;word-break:break-all}
input,textarea{width:100%;border:0;outline:0;font-size:16px;background:transparent;box-sizing:border-box}
textarea{min-height:90px;resize:vertical}
.sec{text-align:center;font-weight:700;background:#fafafa}
.chk{width:auto;transform:scale(1.1);margin-right:4px}
.inline-field{display:inline-block;vertical-align:middle}
.uline{border-bottom:1px solid #333;background:transparent}
.btn{position:sticky;bottom:0;background:#111;color:#fff;border:0;border-radius:8px;padding:12px 16px;margin:6px 4px;cursor:pointer}
.sig-preview{border:1px dashed #888;height:95px;width:100%;display:block;background:#fff;touch-action:none;cursor:pointer}
.sign-meta{display:grid;grid-template-columns:110px 1fr 70px 1fr;gap:8px;align-items:center;margin-top:10px}
.sign-meta .lbl{white-space:nowrap}
.muted{color:#666;font-size:13px}
.nowrap{white-space:nowrap}
.sign-modal{position:fixed;inset:0;background:#fff;z-index:9999;display:none;flex-direction:column}
.sign-modal.show{display:flex}
.sign-top{height:54px;display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid #ddd;background:#fff;box-sizing:border-box}
.sign-title{font-weight:700;flex:1;font-size:16px}
.sign-top button{border:0;border-radius:8px;padding:10px 14px;font-size:15px;cursor:pointer}
.sign-cancel{background:#e5e7eb;color:#111}
.sign-clear{background:#f3f4f6;color:#111;border:1px solid #ddd!important}
.sign-ok{background:#111;color:#fff}
.sign-board-wrap{flex:1;position:relative;background:#fafafa;overflow:hidden}
.sign-board{width:100%;height:100%;display:block;background:#fff;touch-action:none}
.sign-watermark{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);color:#cfcfcf;font-size:26px;letter-spacing:4px;pointer-events:none;user-select:none}
@media (max-width:768px){
  .wrap{padding:8px}
  .head,.sub{font-size:16px}
  td,th{padding:6px;font-size:14px}
  input,textarea{font-size:15px}
  textarea{min-height:80px}
  .sig-preview{height:105px}
  .sign-meta{grid-template-columns:72px 1fr;gap:6px}
  .sign-meta .date-label{grid-column:1/2}
  .sign-meta .date-input{grid-column:2/3}
  .sign-top{height:58px}
  .sign-title{font-size:15px}
  .sign-top button{padding:10px 12px}
}
@media print{
  .no,.sign-modal{display:none!important}
  body{background:#fff}
  .wrap{max-width:none;padding:0}
  .sig-preview{border:0}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">厦门科华数能科技有限公司</div>
  <div class="sub">光伏储能系统现场服务记录单</div>

  <table>
    <tr>
      <td style="width:15%">服务流程号</td>
      <td style="width:40%"><input></td>
      <td style="width:15%">填表日期</td>
      <td style="width:30%"><input type="date"></td>
    </tr>

    <tr><td colspan="4" class="sec">一、基本信息</td></tr>
    <tr><td>项目名称</td><td colspan="3"><input></td></tr>
    <tr><td>最终客户</td><td><input></td><td>客户联系人</td><td><input></td></tr>
    <tr><td>客户地址</td><td><input></td><td>联系电话</td><td><input></td></tr>
    <tr>
      <td>服务内容</td>
      <td colspan="3">
        <label><input class="chk" type="checkbox">调试</label>
        <label><input class="chk" type="checkbox">维修</label>
        <label><input class="chk" type="checkbox">巡检</label>
        <label><input class="chk" type="checkbox">升级</label>
        <span class="nowrap">其他：</span><input class="inline-field uline" style="width:180px">
      </td>
    </tr>
    <tr><td>服务工程师</td><td><input></td><td>工程师联系电话</td><td><input></td></tr>
    <tr><td>服务开始日期</td><td><input type="date" id="s"></td><td>服务结束日期</td><td><input type="date" id="e"></td></tr>
    <tr><td>共计服务天数</td><td colspan="3"><input id="days" placeholder="自动计算"></td></tr>

    <tr><td colspan="4" class="sec">二、服务内容及处理结果（服务工程师填写）</td></tr>
    <tr><td>问题描述</td><td colspan="3"><textarea></textarea></td></tr>
    <tr><td>处理过程</td><td colspan="3"><textarea></textarea></td></tr>
    <tr>
      <td>处理结果</td>
      <td colspan="3">
        <label><input class="chk" type="checkbox">已完成，系统运行正常</label>
        <label><input class="chk" type="checkbox">需后续跟进</label>
        <span class="nowrap">说明：</span><input class="inline-field uline" style="width:220px"><br>
        其他：<input class="uline">
      </td>
    </tr>

    <tr><td colspan="4" class="sec">三、客户评价</td></tr>
    <tr>
      <td>满意度评价</td>
      <td colspan="3">
        <label><input class="chk" type="checkbox">非常满意</label>
        <label><input class="chk" type="checkbox">满意</label>
        <label><input class="chk" type="checkbox">一般</label>
        <label><input class="chk" type="checkbox">不满意</label>
      </td>
    </tr>
    <tr><td>意见 / 建议</td><td colspan="3"><textarea></textarea></td></tr>

    <tr><td colspan="4" class="sec">四、现场服务确认（客户填写）</td></tr>
    <tr>
      <td>确认内容</td>
      <td colspan="3">
        本人确认：上述服务人员于
        <input class="inline-field uline" style="width:64px"> 年
        <input class="inline-field uline" style="width:48px"> 月
        <input class="inline-field uline" style="width:48px"> 日至
        <input class="inline-field uline" style="width:64px"> 年
        <input class="inline-field uline" style="width:48px"> 月
        <input class="inline-field uline" style="width:48px"> 日期间，共计
        <input class="inline-field uline" style="width:60px"> 人天，在本单位现场提供了真实有效的服务。
      </td>
    </tr>

    <tr>
      <td>服务工程师签字</td>
      <td colspan="3">
        <canvas class="sig-preview" data-title="服务工程师签字"></canvas>
        
        <div class="sign-meta">
          <div class="lbl">联系方式</div><input>
          <div class="lbl date-label">日期</div><input class="date-input" type="date">
        </div>
      </td>
    </tr>

    <tr>
      <td>客户签字</td>
      <td colspan="3">
        <canvas class="sig-preview" data-title="客户签字"></canvas>
        
        <div class="sign-meta">
          <div class="lbl">联系方式</div><input>
          <div class="lbl date-label">日期</div><input class="date-input" type="date">
        </div>
      </td>
    </tr>
  </table>

  <div class="no">
    
    <button class="btn" onclick="window.print()">导出 PDF</button>
    <button class="btn" onclick="clearAllData()">清空</button>
  </div>
</div>

<div id="signModal" class="sign-modal no">
  <div class="sign-top">
    <button class="sign-cancel" type="button" onclick="closeSign(false)">取消</button>
    <div id="signTitle" class="sign-title">签字</div>
    <button class="sign-clear" type="button" onclick="clearBoard()">清除</button>
    <button class="sign-ok" type="button" onclick="closeSign(true)">确认</button>
  </div>
  <div class="sign-board-wrap">
    <canvas id="signBoard" class="sign-board"></canvas>
    <div class="sign-watermark"></div>
  </div>
</div>

<script>
const fields=document.querySelectorAll('input,textarea');
fields.forEach((x,i)=>{
  const k='f'+i;
  if(x.type==='checkbox'){
    x.checked=localStorage[k]==='1';
    x.onchange=()=>localStorage[k]=x.checked?'1':'0';
  }else{
    x.value=localStorage[k]||'';
    x.oninput=()=>localStorage[k]=x.value;
    x.onchange=()=>localStorage[k]=x.value;
  }
});

function calc(){
  if(s.value&&e.value){
    const a=new Date(s.value),b=new Date(e.value);
    days.value=Math.max(1,Math.round((b-a)/86400000)+1);
    const idx=[...fields].indexOf(days);
    if(idx>=0) localStorage['f'+idx]=days.value;
  }
}
s.onchange=e.onchange=calc;

function fitCanvas(c){
  const ratio=Math.max(window.devicePixelRatio||1,1);
  const rect=c.getBoundingClientRect();
  c.width=Math.max(1,Math.floor(rect.width*ratio));
  c.height=Math.max(1,Math.floor(rect.height*ratio));
  const ctx=c.getContext('2d');
  ctx.setTransform(ratio,0,0,ratio,0,0);
  ctx.lineWidth=2.4;
  ctx.lineCap='round';
  ctx.lineJoin='round';
  ctx.strokeStyle='#111';
}

function copyCanvas(src,dst){
  fitCanvas(dst);
  const dctx=dst.getContext('2d');
  const dw=dst.getBoundingClientRect().width, dh=dst.getBoundingClientRect().height;
  dctx.clearRect(0,0,dw,dh);
  if(src){
    dctx.drawImage(src,0,0,dw,dh);
  }
}

const previews=[...document.querySelectorAll('.sig-preview')];
previews.forEach((c,i)=>{
  fitCanvas(c);
  const saved=localStorage['sig'+i];
  if(saved){
    const img=new Image();
    img.onload=()=>c.getContext('2d').drawImage(img,0,0,c.getBoundingClientRect().width,c.getBoundingClientRect().height);
    img.src=saved;
  }
  c.addEventListener('click',()=>openSign(c,i));
});

let activePreview=null,activeIndex=0,draw=false;
const modal=document.getElementById('signModal');
const board=document.getElementById('signBoard');
const bctx=board.getContext('2d');

function openSign(preview,index){
  activePreview=preview;
  activeIndex=index;
  document.getElementById('signTitle').textContent=preview.dataset.title||'签字';
  modal.classList.add('show');
  document.body.style.overflow='hidden';
  setTimeout(()=>{
    fitCanvas(board);
    bctx.clearRect(0,0,board.getBoundingClientRect().width,board.getBoundingClientRect().height);
    const saved=localStorage['sig'+index];
    if(saved){
      const img=new Image();
      img.onload=()=>bctx.drawImage(img,0,0,board.getBoundingClientRect().width,board.getBoundingClientRect().height);
      img.src=saved;
    }
  },50);
}

function closeSign(save){
  if(save && activePreview){
    copyCanvas(board,activePreview);
    localStorage['sig'+activeIndex]=activePreview.toDataURL('image/png');
  }
  modal.classList.remove('show');
  document.body.style.overflow='';
}

function clearBoard(){
  bctx.clearRect(0,0,board.getBoundingClientRect().width,board.getBoundingClientRect().height);
}

function point(e){
  const r=board.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  return [t.clientX-r.left,t.clientY-r.top];
}

board.addEventListener('pointerdown',e=>{
  e.preventDefault();
  draw=true;
  bctx.beginPath();
  bctx.moveTo(...point(e));
});
board.addEventListener('pointermove',e=>{
  if(!draw)return;
  e.preventDefault();
  bctx.lineTo(...point(e));
  bctx.stroke();
});
board.addEventListener('pointerup',()=>draw=false);
board.addEventListener('pointerleave',()=>draw=false);

window.addEventListener('resize',()=>{
  previews.forEach((c,i)=>{
    const saved=localStorage['sig'+i];
    fitCanvas(c);
    if(saved){
      const img=new Image();
      img.onload=()=>c.getContext('2d').drawImage(img,0,0,c.getBoundingClientRect().width,c.getBoundingClientRect().height);
      img.src=saved;
    }
  });
  if(modal.classList.contains('show')){
    const temp=board.toDataURL('image/png');
    fitCanvas(board);
    const img=new Image();
    img.onload=()=>bctx.drawImage(img,0,0,board.getBoundingClientRect().width,board.getBoundingClientRect().height);
    img.src=temp;
  }
});

function clearAllData(){
  localStorage.clear();
  location.reload();
}
</script>
</body>
</html>
